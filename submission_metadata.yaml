ai_usage_summary: |
  Used Claude (Anthropic) to design, build, debug, and document the ranking
  pipeline (feature extraction, scoring logic, reasoning generation, honeypot
  detection) over an iterative session: initial architecture, then targeted
  bug fixes after inspecting actual output against the sample dataset
  (corrected a tenure-chaser false-positive heuristic and a score-rounding
  tie-break violation found by running the official validator). No candidate
  data was sent to any external LLM API — all scoring runs locally and
  offline, per the compute constraints in submission_spec.md Section 3.

methodology_summary: |
  Hybrid ranker: structured features (title-family classification, trust-
  weighted skill scoring using proficiency x endorsements x duration_months,
  career tenure/seniority pattern, location fit, education tier) combined
  with a TF-IDF + cosine-similarity score against the JD text. Composite =
  weighted sum (title 32%, skills 27%+6% nice-to-have, narrative evidence
  13%, experience-band fit 10%, location 7%, TF-IDF similarity 5%), then a
  multiplicative gate for the JD's explicit disqualifiers (research-only,
  consulting-only career, CV/speech/robotics without NLP/IR, off-target
  title, escalating-seniority-with-short-tenure pattern) and a multiplicative
  behavioral modifier from Redrob signals (recency, recruiter response rate,
  open-to-work flag, verification). Honeypots are detected via internal-
  consistency checks (YOE vs. career-history-sum mismatch, mass zero-duration
  "expert" skill claims, implausible single-role tenure, recent-grad/high-YOE
  conflict) and excluded from the top-100 eligible pool. Reasoning strings
  are assembled only from facts present in the candidate's own record, so
  hallucinated claims are structurally impossible. Runtime: under a minute
  for 100K candidates on a single CPU core in testing.

